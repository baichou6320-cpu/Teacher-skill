# Teacher-skill 配置文件
# 所有可调参数集中于此，代码中不再硬编码

llm:
  # 模型标识（Anthropic 兼容接口）。
  # 修改模型请改这里；.env 只负责 API Key 和可选 base_url。
  # 示例：
  # - Anthropic 官方: claude-sonnet-4-20250514
  # - Kimi/Moonshot: kimi-k2.5（通常需要在 .env 设置 ANTHROPIC_BASE_URL）
  model_id: "claude-sonnet-4-20250514"
  # 生成参数
  temperature: 0.7
  max_tokens: 2048
  # 场景-specific token 预算
  analysis_max_tokens: 4096      # 材料分析（需要输出大量 JSON）
  judgment_max_tokens: 1024      # 判卷（只需简短 JSON）
  onboarding_max_tokens: 512     # 用户摸底（只需简短 JSON）
  # 客户端行为
  retry_count: 3
  timeout: 30

teaching:
  # 渐进提示最高等级（达到后自动推进或给答案）
  hint_max_level: 4
  # 功能开关
  enable_rewards: true
  enable_persona: false
  # Prompt 模式："merged" = 讲解+判卷共用一份 Prompt（省 API 调用，向后兼容）
  #              "split"  = 分层架构：_base + _persona + teach/judge（推荐）
  prompt_mode: "split"

paths:
  data_dir: "./data"
  logs_dir: "./logs"

app:
  # 默认用户 ID（多用户支持前的占位）
  user_id: "default_user"
