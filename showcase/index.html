<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teacher-skill Showcase</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="side-nav" aria-label="Demo navigation">
        <div class="brand-lockup">
          <div class="brand-mark">T</div>
          <div>
            <div class="brand-name">Teacher-skill</div>
            <div class="brand-caption">启发式数字助教</div>
          </div>
        </div>

        <nav class="step-list" aria-label="Presentation flow">
          <button class="step-item is-active" data-step="0">
            <span>01</span>
            <strong>材料输入</strong>
          </button>
          <button class="step-item" data-step="1">
            <span>02</span>
            <strong>知识拆解</strong>
          </button>
          <button class="step-item" data-step="2">
            <span>03</span>
            <strong>提问判卷</strong>
          </button>
          <button class="step-item" data-step="3">
            <span>04</span>
            <strong>复习报告</strong>
          </button>
        </nav>

        <div class="proof-strip">
          <div>
            <span>Unit Tests</span>
            <strong>148/148</strong>
          </div>
          <div>
            <span>Demo Time</span>
            <strong>3 min</strong>
          </div>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Boss Demo Prototype</p>
            <h1>把学习材料变成可验证的学习闭环</h1>
          </div>
          <div class="topbar-actions">
            <button id="prevStep" class="icon-button" title="上一步" aria-label="上一步">‹</button>
            <button id="nextStep" class="primary-button">下一步</button>
          </div>
        </header>

        <section class="demo-grid">
          <div class="material-panel">
            <div class="panel-heading">
              <span class="status-dot"></span>
              <h2>学习材料</h2>
            </div>
            <textarea id="materialInput" aria-label="学习材料">Transformer 是一种基于注意力机制的深度学习架构。它抛弃了 RNN 的逐步循环计算，用自注意力一次性建模序列中不同 token 之间的关系。由于没有天然的顺序结构，Transformer 需要位置编码告诉模型每个 token 在序列中的位置。多头注意力会并行学习多组关系，让模型同时捕捉语义、语法和长距离依赖。</textarea>
            <div class="material-meta">
              <span id="charCount">0 字符</span>
              <button id="analyzeButton">生成知识卡片</button>
            </div>
          </div>

          <div class="cards-panel">
            <div class="panel-heading">
              <span class="status-dot amber"></span>
              <h2>知识卡片</h2>
            </div>
            <div class="knowledge-list" id="knowledgeList"></div>
          </div>

          <div class="teaching-panel">
            <div class="panel-heading">
              <span class="status-dot blue"></span>
              <h2>讲解与判卷</h2>
            </div>
            <div class="dialogue-box" id="dialogueBox"></div>
            <div class="answer-row">
              <input id="answerInput" type="text" value="选 B。自注意力在计算 token 之间的关系权重。" aria-label="用户回答">
              <button id="submitAnswer">提交回答</button>
              <button id="directAnswer" class="secondary-button">速查</button>
            </div>
          </div>

          <div class="report-panel">
            <div class="panel-heading">
              <span class="status-dot green"></span>
              <h2>学习报告</h2>
            </div>
            <div class="metric-grid">
              <div class="metric">
                <span>已掌握</span>
                <strong id="masteredMetric">0</strong>
              </div>
              <div class="metric">
                <span>待巩固</span>
                <strong id="reviewMetric">0</strong>
              </div>
              <div class="metric">
                <span>完成率</span>
                <strong id="rateMetric">0%</strong>
              </div>
            </div>
            <div class="report-timeline" id="reportTimeline"></div>
          </div>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
